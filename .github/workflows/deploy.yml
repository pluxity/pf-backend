name: Deploy Changed Modules (Docker)

on:
  push:
    branches: [ "main" ]

jobs:
  # ── 1. 변경된 모듈 감지 (.github/deploy-config.json 기반) ──
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed modules
        id: set-matrix
        run: |
          CONFIG=$(cat .github/deploy-config.json)

          # 변경된 파일 목록 (push 이벤트의 before..after 비교)
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED_FILES=$(git diff --name-only "$BEFORE" "${{ github.sha }}")
          fi

          echo "=== Changed files ==="
          echo "$CHANGED_FILES"

          # 빌드 인프라 변경 여부 (gradle, 루트 빌드 설정)
          INFRA_CHANGED=false
          if echo "$CHANGED_FILES" | grep -qE '^(gradle/|build\.gradle\.kts|settings\.gradle\.kts)'; then
            INFRA_CHANGED=true
          fi

          # 변경된 모듈만 필터링 (build.gradle.kts에서 의존성 자동 파싱)
          CHANGED_MODULES="[]"
          for module in $(echo "$CONFIG" | jq -r '.[].name'); do
            SHOULD_DEPLOY=false

            # 앱 자체 변경
            if echo "$CHANGED_FILES" | grep -q "^apps/$module/"; then
              SHOULD_DEPLOY=true
            fi

            # 빌드 인프라 변경
            if [ "$INFRA_CHANGED" = true ]; then
              SHOULD_DEPLOY=true
            fi

            # build.gradle.kts에서 project(":xxx:yyy") 의존성을 파싱하여 경로 변환
            GRADLE_FILE="apps/$module/build.gradle.kts"
            if [ -f "$GRADLE_FILE" ]; then
              DEPS=$(grep -oP 'project\(":([^"]+)"\)' "$GRADLE_FILE" | sed 's/project("://;s/")//' | tr ':' '/')
              for dep in $DEPS; do
                if echo "$CHANGED_FILES" | grep -q "^$dep/"; then
                  SHOULD_DEPLOY=true
                  break
                fi
              done
            fi

            if [ "$SHOULD_DEPLOY" = true ]; then
              MODULE_JSON=$(echo "$CONFIG" | jq -c ".[] | select(.name == \"$module\")")
              CHANGED_MODULES=$(echo "$CHANGED_MODULES" | jq -c ". + [$MODULE_JSON]")
            fi
          done

          echo "=== Changed modules ==="
          echo "$CHANGED_MODULES"

          if [ "$CHANGED_MODULES" = "[]" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":$CHANGED_MODULES}" >> "$GITHUB_OUTPUT"
          fi

  # ── 2. 변경된 모듈 배포 (matrix) ──
  deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f ${{ matrix.dockerfile }} -t ${{ matrix.image }}:latest .

      - name: Save Docker image to tar
        run: |
          docker save -o ${{ matrix.image }}.tar ${{ matrix.image }}:latest
          chmod 644 ${{ matrix.image }}.tar

      - name: Upload Docker image tar to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PLX_DEV_DOMAIN }}
          username: ${{ secrets.PLX_DEV_USER }}
          password: ${{ secrets.PLX_DEV_PASSWORD }}
          port: ${{ secrets.PLX_DEV_SSH_PORT }}
          source: "${{ matrix.image }}.tar"
          target: "${{ secrets.DOCKER_PATH }}/${{ matrix.dir }}"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.PLX_DEV_DOMAIN }}
          username: ${{ secrets.PLX_DEV_USER }}
          password: ${{ secrets.PLX_DEV_PASSWORD }}
          port: ${{ secrets.PLX_DEV_SSH_PORT }}
          script: |
            cd ${{ secrets.DOCKER_PATH }}/${{ matrix.dir }}
            chmod +x deploy.sh
            ./deploy.sh
